services:
  truenas-ncdu:
    image: docker.io/joanmarcriera/truenas-ncdu:latest
    container_name: truenas-ncdu
    command: ["--", "sleep", "infinity"]
    stdin_open: true
    tty: true
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      NCDU_PATH: /mnt/BigDisk
      NCDU_ONE_FILESYSTEM: "true"
    volumes:
      - type: bind
        source: /mnt/BigDisk
        target: /mnt/BigDisk
        read_only: true
