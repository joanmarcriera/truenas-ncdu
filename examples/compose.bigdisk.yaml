services:
  truenas-ncdu:
    image: docker.io/joanmarcriera/truenas-ncdu:0.2.0
    container_name: truenas-ncdu
    command: ["web"]
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      NCDU_PATH: /mnt/BigDisk
      NCDU_ONE_FILESYSTEM: "true"
      TTYD_USER: admin
      TTYD_PASSWORD: change-this-password
    ports:
      - "7681:7681"
    volumes:
      - type: bind
        source: /mnt/BigDisk
        target: /mnt/BigDisk
        read_only: true
